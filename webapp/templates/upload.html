<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEFFORT Web - Upload FIT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #e2e8f0;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #1e293b;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        .subtitle {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1rem;
        }
        .upload-area {
            border: 2px dashed #475569;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: #0f172a;
        }
        .upload-area:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }
        .upload-area.dragover {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
        }
        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        .upload-text {
            color: #94a3b8;
            margin-bottom: 20px;
        }
        input[type="file"] {
            display: none;
        }
        .file-label {
            display: inline-block;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .file-label:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            transform: translateY(-2px);
        }
        .settings-section {
            margin-top: 30px;
            padding: 20px;
            background: #0f172a;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        .settings-title {
            font-size: 1.1rem;
            color: #60a5fa;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .form-group {
            flex: 1;
        }
        label {
            display: block;
            color: #94a3b8;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #475569;
            border-radius: 6px;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 1rem;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .submit-btn {
            width: 100%;
            margin-top: 25px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .submit-btn:hover {
            background: linear-gradient(135deg, #16a34a, #15803d);
            transform: translateY(-2px);
        }
        .submit-btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }
        .selected-file {
            margin-top: 15px;
            padding: 10px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
            border-radius: 6px;
            color: #22c55e;
            font-size: 0.9rem;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        .loading.active {
            display: block;
        }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #334155;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚴 PEFFORT Web</h1>
        <p class="subtitle">Analisi Effort da File FIT</p>
        
        <form id="uploadForm" action="/upload" method="post" enctype="multipart/form-data">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <p class="upload-text">Trascina un file FIT qui o clicca per selezionare</p>
                <label class="file-label" for="fitFile">Seleziona File FIT</label>
                <input type="file" id="fitFile" name="file" accept=".fit" required>
                <div class="selected-file" id="selectedFile" style="display: none;"></div>
            </div>
            
            <div class="settings-section">
                <div class="settings-title">⚙️ Parametri Atleta</div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="ftp">FTP (W)</label>
                        <input type="number" id="ftp" name="ftp" value="280" min="50" max="500" step="5">
                    </div>
                    <div class="form-group">
                        <label for="weight">Peso (kg)</label>
                        <input type="number" id="weight" name="weight" value="70" min="30" max="150" step="0.5">
                    </div>
                </div>
                
                <div class="settings-title" style="margin-top: 20px;">🎯 Parametri Effort Detection</div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="window_sec">Finestra (s)</label>
                        <input type="number" id="window_sec" name="window_sec" value="60" min="10" max="300">
                    </div>
                    <div class="form-group">
                        <label for="min_ftp_pct">Min FTP (%)</label>
                        <input type="number" id="min_ftp_pct" name="min_ftp_pct" value="100" min="50" max="200">
                    </div>
                    <div class="form-group">
                        <label for="merge_pct">Merge Tolerance (%)</label>
                        <input type="number" id="merge_pct" name="merge_pct" value="15" min="5" max="50">
                    </div>
                </div>
                
                <div class="settings-title" style="margin-top: 20px;">✂️ Trim & Extend</div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="trim_win">Trim Window (s)</label>
                        <input type="number" id="trim_win" name="trim_win" value="10" min="5" max="60">
                    </div>
                    <div class="form-group">
                        <label for="trim_low">Trim Low (%)</label>
                        <input type="number" id="trim_low" name="trim_low" value="85" min="50" max="100">
                    </div>
                    <div class="form-group">
                        <label for="extend_win">Extend Window (s)</label>
                        <input type="number" id="extend_win" name="extend_win" value="15" min="5" max="60">
                    </div>
                    <div class="form-group">
                        <label for="extend_low">Extend Low (%)</label>
                        <input type="number" id="extend_low" name="extend_low" value="80" min="50" max="100">
                    </div>
                </div>
                
                <div class="settings-title" style="margin-top: 20px;">🚀 Sprint Detection</div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="sprint_min_power">Min Power (W)</label>
                        <input type="number" id="sprint_min_power" name="sprint_min_power" value="500" min="200" max="1500">
                    </div>
                    <div class="form-group">
                        <label for="sprint_min_duration">Min Duration (s)</label>
                        <input type="number" id="sprint_min_duration" name="sprint_min_duration" value="5" min="3" max="30">
                    </div>
                    <div class="form-group">
                        <label for="sprint_merge_gap">Merge Gap (s)</label>
                        <input type="number" id="sprint_merge_gap" name="sprint_merge_gap" value="3" min="1" max="10">
                    </div>
                </div>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn" disabled>
                🚀 Analizza e Visualizza Effort
            </button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 15px; color: #94a3b8;">Elaborazione in corso...</p>
            </div>
        </form>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fitFile');
        const selectedFile = document.getElementById('selectedFile');
        const submitBtn = document.getElementById('submitBtn');
        const form = document.getElementById('uploadForm');
        const loading = document.getElementById('loading');

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                updateSelectedFile();
            }
        });

        // Click to upload
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', updateSelectedFile);

        function updateSelectedFile() {
            if (fileInput.files.length) {
                const file = fileInput.files[0];
                selectedFile.textContent = `✅ File selezionato: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
                selectedFile.style.display = 'block';
                submitBtn.disabled = false;
            } else {
                selectedFile.style.display = 'none';
                submitBtn.disabled = true;
            }
        }

        form.addEventListener('submit', () => {
            loading.classList.add('active');
            submitBtn.disabled = true;
        });
    </script>
</body>
</html>
