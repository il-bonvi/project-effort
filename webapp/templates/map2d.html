<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8' />
    <title>2D Map View - {{ distance_km|round(1) }} km</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #fff;
        }

        /* â”€â”€ Layout â”€â”€ */
        #map {
            position: absolute;
            top: 0;
            bottom: 150px;
            left: 280px;
            width: calc(100% - 280px);
            height: calc(100% - 150px);
        }

        #elevation-chart {
            position: absolute;
            bottom: 0;
            left: 280px;
            width: calc(100% - 280px);
            height: 150px;
            background: rgba(15,23,42,.95);
            overflow: hidden;
        }

        #resize-handle {
            position: absolute;
            top: -5px;
            left: 0;
            right: 0;
            width: 100%;
            height: 10px;
            cursor: ns-resize;
            background: transparent;
            z-index: 20;
        }

        /* â”€â”€ Sidebar â”€â”€ */
        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: rgba(15,23,42,.98);
            border-right: 1px solid rgba(255,255,255,.2);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .sidebar-empty {
            margin-top: 40px;
            color: #94a3b8;
            font-size: 13px;
            line-height: 1.6;
            text-align: center;
        }

        .selected-header {
            background: #111827;
            border-radius: 8px;
            padding: 10px 12px;
            margin-top: 24px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }
        .selected-title { color: #e5e7eb; font-size: 15px; font-weight: 700; }
        .selected-subtitle-line { color: #9ca3af; font-size: 11.5px; margin-top: 1px; }
        .selected-power { color: #f3f4f6; font-size: 19px; font-weight: 700; margin-top: 6px; }
        .selected-power span { font-size: 12px; font-weight: 500; color: #9ca3af; }

        .selected-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .metric-col {
            background: #0b1220;
            border: 1px solid rgba(148,163,184,.18);
            border-radius: 8px;
            padding: 9px 10px;
        }
        .metric-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; padding: 2px 0; }
        .metric-label { color: #9ca3af; font-size: 11.5px; white-space: nowrap; }
        .metric-value { color: #f8fafc; font-size: 11.5px; font-weight: 600; text-align: right; }

        .stream-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            padding: 7px 12px;
            cursor: pointer;
            white-space: nowrap;
        }
        .stream-btn:hover { background: linear-gradient(135deg, #2563eb, #1d4ed8); }

        .sidebar-close-btn {
            background: rgba(239,68,68,.15);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,.3);
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            padding: 4px 8px;
            cursor: pointer;
            min-width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sidebar-close-btn:hover { background: rgba(239,68,68,.25); }

        /* â”€â”€ Controls â”€â”€ */
        .controls {
            position: absolute;
            bottom: 160px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 500;
        }
        .control-btn {
            background: #1e40af;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all .3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,.3);
            min-width: 120px;
            text-align: center;
        }
        .control-btn:hover { background: #1e3a8a; }

        #styleSelect {
            background: #1e40af;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            box-shadow: 0 2px 8px rgba(0,0,0,.3);
        }

        /* â”€â”€ Hover tooltip â”€â”€ */
        #hover-tooltip {
            position: fixed;
            top: 10px;
            right: 20px;
            background: rgba(15,23,42,.95);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,.2);
            font-size: 12px;
            color: #fbbf24;
            z-index: 2000;
            display: none;
            box-shadow: 0 4px 12px rgba(0,0,0,.5);
        }

        /* â”€â”€ Leaflet overrides â”€â”€ */
        .leaflet-container { background: #1e293b; }
        .leaflet-control-zoom a {
            background: #1e40af !important;
            color: white !important;
            border-color: #1e3a8a !important;
        }
        .leaflet-control-zoom a:hover { background: #1e3a8a !important; }
        .leaflet-popup-content-wrapper {
            background: rgba(15,23,42,.96);
            color: #9ca3af;
            border: 1px solid rgba(255,255,255,.15);
            border-radius: 8px;
        }
        .leaflet-popup-tip { background: rgba(15,23,42,.96); }
        .leaflet-popup-close-button { color: #9ca3af !important; }

        .stream-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stream-modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .stream-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 92vw;
            max-width: 1400px;
            height: 90vh;
            overflow: hidden;
            z-index: 501;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.34, 1.15, 0.64, 1);
        }

        .stream-modal.active {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        .stream-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e5e7eb;
            flex-shrink: 0;
        }

        .stream-modal-header h2 {
            font-size: 18px;
            font-weight: bold;
            color: #111827;
            margin: 0;
        }

        .stream-modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #6b7280;
        }

        .stream-control-panel {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
            align-items: center;
            padding: 10px 12px;
            background: #f9fafb;
            border-radius: 8px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .stream-control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stream-control-group label {
            font-size: 12px;
            font-weight: bold;
            color: #374151;
            white-space: nowrap;
        }

        .stream-control-group input[type="range"] {
            width: 120px;
            height: 5px;
            border-radius: 3px;
            background: linear-gradient(to right, #fee2e2, #fecaca, #fca5a5);
            outline: none;
            cursor: pointer;
        }

        .stream-control-group .value-display {
            font-size: 12px;
            font-weight: bold;
            color: #1f2937;
            background: white;
            padding: 4px 8px;
            border-radius: 4px;
            min-width: 35px;
            text-align: center;
            border: 1px solid #e5e7eb;
        }

        .stream-charts-container {
            display: block;
            overflow: hidden;
            flex: 1;
            min-height: 0;
        }

        .stream-chart {
            display: none;
        }

        #streamUnifiedChart {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            background: white;
            position: relative;
        }
    </style>
</head>
<body>
    <div id='hover-tooltip'></div>
    <div id='map'></div>
    <div id='elevation-chart'>
        <div id='resize-handle'></div>
    </div>

    <div id="streamModalOverlay" class="stream-modal-overlay"></div>
    <div id="streamModal" class="stream-modal">
        <div class="stream-modal-header">
            <h2 id="streamModalTitle">Stream Zoom</h2>
            <button class="stream-modal-close" id="streamModalCloseBtn">âœ•</button>
        </div>
        <div class="stream-control-panel" id="streamControlPanel">
            <div class="stream-control-group">
                <label for="avg30sStreamSlider">Avg 1:</label>
                <input type="range" id="avg30sStreamSlider" min="5" max="120" value="30">
                <span class="value-display" id="avg30sStreamValue">30s</span>
            </div>
            <div class="stream-control-group">
                <label for="avg60sStreamSlider">Avg 2:</label>
                <input type="range" id="avg60sStreamSlider" min="10" max="240" value="60">
                <span class="value-display" id="avg60sStreamValue">60s</span>
            </div>
        </div>
        <div class="stream-charts-container">
            <div id="streamChart1" class="stream-chart"></div>
            <div id="streamChart2" class="stream-chart"></div>
            <div id="streamChart3" class="stream-chart"></div>
            <div id="streamUnifiedChart"></div>
        </div>
    </div>

    <div id='sidebar'>
        <div id='sidebar-content'>
            <div class="sidebar-empty">
                <div style="font-size: 2rem; margin-bottom: 12px;">ðŸ—ºï¸</div>
                <strong style="color: #e2e8f0; display: block; margin-bottom: 8px;">2D Map</strong>
                Clicca su un marker effort/sprint per vedere i dettagli.<br><br>
                Seleziona un'area sull'altimetria per filtrare la traccia.
            </div>
        </div>
    </div>

    <div class='controls'>
        <select id='styleSelect'>
            <option value='osm'>OpenStreetMap</option>
            <option value='topo'>OpenTopoMap</option>
            <option value='satellite'>Esri Satellite</option>
            <option value='cycle'>CyclOSM</option>
        </select>
        <button class='control-btn' id='toggleEfforts'>ðŸ‘Š Efforts: ON</button>
        <button class='control-btn' id='toggleSprints'>ðŸƒ Sprints: ON</button>
        <button class='control-btn' id='resetViewBtn'>ðŸŽ¯ Reset View</button>
    </div>

    <script src="/static/js/peffort_common.js?v=2026040401"></script>
    <script>
        // â”€â”€ Data injected from server â”€â”€
        const efforts_data_json   = {{ efforts_data_json | safe }};
        const chart_data_json     = {{ chart_data_json | safe }};
        const geojson_str         = {{ geojson_str | safe }};
        const elevation_data_json = {{ elevation_data_json | safe }};
        const center_lat  = {{ center_lat }};
        const center_lon  = {{ center_lon }};
        const initial_zoom = {{ zoom }};

        let effortUpdateChannel = null;
        try {
            effortUpdateChannel = new BroadcastChannel('peffort_{{ session_id }}');
            effortUpdateChannel.onmessage = (event) => {
                if (event?.data?.type === 'efforts_updated') { location.reload(); }
            };
        } catch (e) {
            console.warn('BroadcastChannel not supported on this browser', e);
        }
        window.addEventListener('beforeunload', () => {
            if (effortUpdateChannel) effortUpdateChannel.close();
        });
    </script>
    <script src="/static/js/map2d.js?v=2026040402"></script>
</body>
</html>
