<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8' />
    <title>3D Map View - {{ distance_km|round(1) }} km</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <script src='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css' rel='stylesheet' />
    <script src='https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js'></script>
    <link href='/static/css/map3d.css?v=202603294' rel='stylesheet' />
</head>
<body>
    <div id='hover-tooltip'></div>
    <div id='map'></div>
    <div id='elevation-chart'>
        <div id='resize-handle'></div>
    </div>
    
    <div id='sidebar'>
        <button id='sidebar-close'>✕</button>
        <div id='sidebar-content'></div>
    </div>

    <div id="streamModalOverlay" class="stream-modal-overlay"></div>
    <div id="streamModal" class="stream-modal">
        <div class="stream-modal-header">
            <h2 id="streamModalTitle">Stream Zoom</h2>
            <button class="stream-modal-close" id="streamModalCloseBtn">✕</button>
        </div>
        <div class="stream-control-panel" id="streamControlPanel">
            <div class="stream-control-group">
                <label for="avg30sStreamSlider">Avg 1:</label>
                <input type="range" id="avg30sStreamSlider" min="5" max="120" value="30">
                <span class="value-display" id="avg30sStreamValue">30s</span>
            </div>
            <div class="stream-control-group">
                <label for="avg60sStreamSlider">Avg 2:</label>
                <input type="range" id="avg60sStreamSlider" min="10" max="240" value="60">
                <span class="value-display" id="avg60sStreamValue">60s</span>
            </div>
        </div>
        <div class="stream-charts-container">
            <div id="streamChart1" class="stream-chart"></div>
            <div id="streamChart2" class="stream-chart"></div>
            <div id="streamChart3" class="stream-chart"></div>
            <div id="streamUnifiedChart"></div>
        </div>
    </div>

    <div class='controls'>
        <select id='styleSelect'>
            <option value='0'>Topo</option>
            <option value='1'>Streets</option>
            <option value='2'>Bright</option>
            <option value='3'>Hybrid</option>
        </select>
        <button class='control-btn' id='toggleEfforts'>👊 Efforts: ON</button>
        <button class='control-btn' id='toggleSprints'>🏃 Sprints: ON</button>
        <button class='control-btn' id='resetViewBtn'>🎯 Reset View</button>
        <button class='control-btn' id='streamSelectionBtn' style='display:none;'>📊 Stream Selection</button>
    </div>

    <script>
        // Variables for map3d.js
        const efforts_data_json = {{ efforts_data_json | safe }};
        const chart_data_json = {{ chart_data_json | safe }};
        const geojson_str = {{ geojson_str | safe }};
        const elevation_data_json = {{ elevation_data_json | safe }};
        // SECURITY NOTE: this key is visible client-side; restrict by allowed domain in MapTiler settings.
        const maptiler_key = '{{ maptiler_key }}';
        const center_lat = {{ center_lat }};
        const center_lon = {{ center_lon }};
        const zoom = {{ zoom }};
        const session_id = '{{ session_id }}';

        // Listen for effort updates from inspection.html via BroadcastChannel.
        let effortUpdateChannel = null;
        try {
            effortUpdateChannel = new BroadcastChannel(`peffort_{{ session_id }}`);
            effortUpdateChannel.onmessage = (event) => {
                if (event?.data?.type === 'efforts_updated') {
                    console.log('Effort data updated in another tab, reloading map3d...');
                    location.reload();
                }
            };
        } catch (e) {
            console.warn('BroadcastChannel not supported on this browser', e);
        }
        window.addEventListener('beforeunload', () => {
            if (effortUpdateChannel) effortUpdateChannel.close();
        });
    </script>
    <script src='/static/js/peffort_common.js?v=2026040401'></script>
    <script src='/static/js/map3d.js?v=2026040401'></script>
</body>
</html>
